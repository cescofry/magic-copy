name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Build Chrome extension
        run: npm run build:chrome

      - name: Sign Firefox extension (unlisted via AMO)
        run: |
          npm install -g web-ext
          web-ext sign \
            --source-dir dist/firefox \
            --channel unlisted \
            --api-key "${{ secrets.AMO_API_KEY }}" \
            --api-secret "${{ secrets.AMO_API_SECRET }}" \
            --artifacts-dir artifacts

      - name: Find signed XPI
        id: xpi
        run: echo "FILE=$(ls artifacts/*.xpi)" >> "$GITHUB_OUTPUT"

      - name: Package Chrome extension
        run: (cd dist/chrome && zip -r ../../magic-copy-chrome.zip .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.xpi.outputs.FILE }}
            magic-copy-chrome.zip
          generate_release_notes: true
